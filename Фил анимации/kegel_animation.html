<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kegel Exercise Mechanics</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  canvas { display: block; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const img = new Image();
img.src = 'pelvic_floor.png';

const CYCLE_MS = 5000;
let W, H;

// We'll render the full scene on canvas each frame for full control

function easeInOut(t) {
  return 0.5 - 0.5 * Math.cos(Math.PI * t);
}
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

function getPhase(t) {
  // 0.00-0.20 relaxed, 0.20-0.45 activation, 0.45-0.65 contraction, 0.65-0.80 hold, 0.80-1.00 release
  if (t < 0.20) return { name: 'relaxed', local: t / 0.20 };
  if (t < 0.45) return { name: 'activation', local: (t - 0.20) / 0.25 };
  if (t < 0.65) return { name: 'contraction', local: (t - 0.45) / 0.20 };
  if (t < 0.80) return { name: 'hold', local: (t - 0.65) / 0.15 };
  return { name: 'release', local: (t - 0.80) / 0.20 };
}

// Draw the base image with horizontal squeeze toward center
// squeezeAmount 0 = normal, 1 = maximum squeeze
function drawBaseImage(squeezeAmount) {
  const maxSqueeze = 0.15; // 15% max horizontal compression — very noticeable
  const sq = squeezeAmount * maxSqueeze;

  if (sq < 0.001) {
    ctx.drawImage(img, 0, 0, W, H);
    return;
  }

  // Draw in vertical slices, each displaced toward center
  // More displacement near center, less at edges
  const slices = 60;
  const sliceW = W / slices;

  for (let i = 0; i < slices; i++) {
    const srcX = i * sliceW;
    const centerDist = (srcX + sliceW / 2 - W / 2) / (W / 2); // -1 to 1

    // Displacement: stronger near center, zero at far edges
    // Bell-curve shaped displacement
    const displaceFactor = Math.exp(-centerDist * centerDist * 1.5);
    const displacement = -centerDist * sq * W * 0.5 * displaceFactor;

    const destX = srcX + displacement;

    // Also slightly compress each slice width near center
    const scaleLocal = 1 - sq * displaceFactor * 0.3;

    ctx.drawImage(img,
      srcX, 0, sliceW, H,
      destX, 0, sliceW * scaleLocal, H
    );
  }
}

// Green color overlay with sweep
function drawGreenOverlay(sweepProgress, reverse) {
  if (sweepProgress <= 0) return;

  ctx.save();

  // Clip to muscle region
  ctx.beginPath();
  const pts = [
    [0.50, 0.02], [0.60, 0.07], [0.72, 0.14], [0.82, 0.22],
    [0.90, 0.34], [0.95, 0.48], [0.92, 0.62], [0.85, 0.75],
    [0.74, 0.86], [0.62, 0.94], [0.50, 1.00],
    [0.38, 0.94], [0.26, 0.86], [0.15, 0.75], [0.08, 0.62],
    [0.05, 0.48], [0.10, 0.34], [0.18, 0.22], [0.28, 0.14],
    [0.40, 0.07]
  ];
  pts.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p[0] * W, p[1] * H);
    else ctx.lineTo(p[0] * W, p[1] * H);
  });
  ctx.closePath();
  ctx.clip();

  // Use 'overlay' blend to tint while preserving texture
  ctx.globalCompositeOperation = 'overlay';

  const bottomY = H;
  const topY = 0;
  const feather = H * 0.08;

  let currentY;
  if (reverse) {
    // Fading top-to-bottom: green below currentY
    currentY = topY + (bottomY - topY) * sweepProgress;
  } else {
    // Sweeping bottom-to-top: green below currentY moves up
    currentY = bottomY - (bottomY - topY) * sweepProgress;
  }

  // Solid green region
  ctx.fillStyle = 'rgba(30, 180, 60, 0.55)';
  ctx.fillRect(0, currentY + feather, W, bottomY - currentY);

  // Feathered edge
  const grad = ctx.createLinearGradient(0, currentY - feather, 0, currentY + feather);
  if (reverse) {
    grad.addColorStop(0, 'rgba(30, 180, 60, 0.55)');
    grad.addColorStop(1, 'rgba(30, 180, 60, 0)');
  } else {
    grad.addColorStop(0, 'rgba(30, 180, 60, 0)');
    grad.addColorStop(1, 'rgba(30, 180, 60, 0.55)');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, currentY - feather, W, feather * 2);

  ctx.restore();
}

// Arrow drawing — larger and clearer
function drawArrow(x, y, pointDir, opacity, size) {
  if (opacity < 0.02) return;
  ctx.save();
  ctx.globalAlpha = opacity;

  const s = size || 1;
  const len = 70 * s;
  const headW = 28 * s;
  const headL = 30 * s;
  const shaftW = 10 * s;

  ctx.translate(x, y);
  if (pointDir === 'left') ctx.scale(-1, 1);

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetX = 2;
  ctx.shadowOffsetY = 2;

  // Arrow body with gradient
  const grad = ctx.createLinearGradient(0, 0, len, 0);
  grad.addColorStop(0, 'rgba(255,255,255,0.7)');
  grad.addColorStop(1, 'rgba(255,255,255,1)');
  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.moveTo(0, -shaftW / 2);
  ctx.lineTo(len - headL, -shaftW / 2);
  ctx.lineTo(len - headL, -headW / 2);
  ctx.lineTo(len, 0);
  ctx.lineTo(len - headL, headW / 2);
  ctx.lineTo(len - headL, shaftW / 2);
  ctx.lineTo(0, shaftW / 2);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawArrows(outOpacity, inOpacity) {
  const cy = H * 0.50;

  // Outward (← →) — start from near center, point outward
  drawArrow(W * 0.54, cy, 'right', outOpacity, 1.1);
  drawArrow(W * 0.46, cy, 'left', outOpacity, 1.1);

  // Inward (→ ←) — start from edges, point inward
  drawArrow(W * 0.22, cy, 'right', inOpacity, 1.1);
  drawArrow(W * 0.78, cy, 'left', inOpacity, 1.1);
}

// Zoom circle
function drawZoomCircle(glowOpacity, greenAmount, squeezeAmount) {
  const cx = W * 0.82;
  const cy = H * 0.24;
  const r = W * 0.14;

  // Source: upper canal area
  const srcCx = W * 0.50;
  const srcCy = H * 0.15;
  const srcR = W * 0.08;

  // Bracket rectangle
  const brX = W * 0.40, brY = H * 0.04, brW = W * 0.20, brH = H * 0.24;

  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.65)';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(brX, brY, brW, brH);

  // Connector line
  ctx.beginPath();
  ctx.moveTo(brX + brW, brY);
  ctx.lineTo(cx - r * 0.5, cy + r * 0.7);
  ctx.stroke();
  ctx.restore();

  // Circle content
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.clip();

  // Draw magnified crop
  ctx.drawImage(img,
    srcCx - srcR, srcCy - srcR, srcR * 2, srcR * 2,
    cx - r, cy - r, r * 2, r * 2
  );

  // Green tint
  if (greenAmount > 0.01) {
    ctx.globalCompositeOperation = 'overlay';
    ctx.fillStyle = `rgba(30, 180, 60, ${0.5 * greenAmount})`;
    ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
    ctx.globalCompositeOperation = 'source-over';
  }

  // Blood flow glow — pulsing red
  if (glowOpacity > 0.01) {
    const g1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.9);
    g1.addColorStop(0, `rgba(220, 40, 50, ${glowOpacity * 0.8})`);
    g1.addColorStop(0.4, `rgba(220, 40, 50, ${glowOpacity * 0.4})`);
    g1.addColorStop(1, 'rgba(220, 40, 50, 0)');
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = g1;
    ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
  }

  ctx.restore();

  // Border
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 3;
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.restore();
}

function animate(timestamp) {
  const t = (timestamp % CYCLE_MS) / CYCLE_MS;
  const phase = getPhase(t);

  ctx.clearRect(0, 0, W, H);

  let greenSweep = 0;
  let reverseGreen = false;
  let outArrows = 0;
  let inArrows = 0;
  let glowOp = 0;
  let squeeze = 0;
  let greenZoom = 0;

  switch (phase.name) {
    case 'relaxed': {
      const pulse = 0.5 + 0.3 * Math.sin(phase.local * Math.PI * 2);
      outArrows = pulse;
      break;
    }
    case 'activation': {
      const p = easeInOut(phase.local);
      greenSweep = p;
      outArrows = Math.max(0, 1 - phase.local * 3);
      glowOp = p * 0.12;
      greenZoom = p;
      break;
    }
    case 'contraction': {
      const p = easeInOut(phase.local);
      greenSweep = 1;
      squeeze = p;
      inArrows = easeInOut(clamp(phase.local * 1.5, 0, 1));
      glowOp = lerp(0.12, 0.50, p) + 0.06 * Math.sin(phase.local * Math.PI * 3);
      greenZoom = 1;
      break;
    }
    case 'hold': {
      greenSweep = 1;
      squeeze = 1;
      inArrows = 0.6 + 0.3 * Math.sin(phase.local * Math.PI * 2.5);
      glowOp = 0.45 + 0.1 * Math.sin(phase.local * Math.PI * 3);
      greenZoom = 1;
      break;
    }
    case 'release': {
      const p = easeInOut(phase.local);
      reverseGreen = true;
      greenSweep = p; // used as reverse progress
      squeeze = 1 - p;
      inArrows = Math.max(0, 1 - phase.local * 2.5);
      outArrows = clamp((phase.local - 0.5) * 2, 0, 1) * 0.5;
      glowOp = lerp(0.45, 0, p);
      greenZoom = 1 - p;
      break;
    }
  }

  // 1. Draw base image with squeeze deformation
  drawBaseImage(squeeze);

  // 2. Green color overlay
  if (reverseGreen) {
    drawGreenOverlay(greenSweep, true);
  } else if (greenSweep > 0) {
    drawGreenOverlay(greenSweep, false);
  }

  // 3. Arrows
  drawArrows(outArrows, inArrows);

  // 4. Zoom circle with glow
  drawZoomCircle(glowOp, greenZoom, squeeze);

  requestAnimationFrame(animate);
}

img.onload = function() {
  W = img.naturalWidth;
  H = img.naturalHeight;
  canvas.width = W;
  canvas.height = H;
  requestAnimationFrame(animate);
};
</script>

</body>
</html>
