# Конфигурация nginx для Decap CMS админки блога
# Добавить в основной server {} блок elfprint.ru

# Decap CMS local backend proxy
location /api/v1/ {
    proxy_pass http://127.0.0.1:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

# Админка блога — защищена паролем
location /admin {
    auth_basic "Админка блога";
    auth_basic_user_file /etc/nginx/.htpasswd_elfprint;
    try_files $uri $uri/ /admin/index.html;
}
