# 301 редиректы со старого сайта elfprint.ru (Tilda) на новый
# Подключить в основной nginx.conf через include:
#   include /etc/nginx/conf.d/301-redirects.conf;
#
# Цель: сохранение SEO-позиций при переезде с Tilda
# Дата: 2026-03-23

# ===== Страницы услуг =====
# Старый формат: /pechat-{метод}
# Новый формат: /uslugi/{метод} (clean URLs)

location = /pechat-dtf {
    return 301 /uslugi/dtf;
}

location = /pechat-shelkografiya {
    return 301 /uslugi/shelkografiya;
}

location = /pechat-sublimaciya {
    return 301 /uslugi/sublimaciya;
}

location = /vyshivka-na-izdeliyah {
    return 301 /uslugi/vyshivka;
}

location = /poshiv-izdelij {
    return 301 /uslugi;
}

# ===== Оптовая страница =====
location = /izdeliya-optom {
    return 301 /optom;
}

# ===== Политика конфиденциальности =====
location = /soglashenie-na-obrabotku-personalnyh-dannyh {
    return 301 /politika-konfidencialnosti;
}

# ===== Tilda-специфичные артефакты =====
# Tilda генерирует служебные URL, которые могли быть проиндексированы

location ~ ^/tildacdn {
    return 410;
}

# ===== Ловушка для любых других старых URL =====
# Если Яндекс.Вебмастер покажет 404 на других старых URL,
# добавить их сюда по мере обнаружения

# ===== Принудительный trailing slash (для clean URLs) =====
# Astro с output: hybrid + @astrojs/node обслуживает /uslugi/dtf
# без trailing slash. Если нужен slash, раскомментировать:
#
# location ~ ^(/[^.]+[^/])$ {
#     return 301 $1/;
# }

# ===== Канонический домен =====
# Перенаправление www → без www (или наоборот — выбрать один)
server {
    listen 80;
    server_name www.elfprint.ru;
    return 301 https://elfprint.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name www.elfprint.ru;

    # SSL-сертификаты (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/elfprint.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elfprint.ru/privkey.pem;

    return 301 https://elfprint.ru$request_uri;
}

# ===== HTTP → HTTPS =====
server {
    listen 80;
    server_name elfprint.ru;
    return 301 https://elfprint.ru$request_uri;
}
